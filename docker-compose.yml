services:
  db:
    image: postgres:16-alpine
    container_name: milhas_db
    environment:
      POSTGRES_USER: milhas
      POSTGRES_PASSWORD: milhas
      POSTGRES_DB: milhas
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U milhas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: milhas_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: milhas_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Opcional: interface web para inspecionar o Postgres.
  # Acesse http://localhost:8080 (System: PostgreSQL, Server: db, User/Pass/DB: milhas)
  adminer:
    image: adminer:latest
    container_name: milhas_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data:
